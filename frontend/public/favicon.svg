<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c026d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cercle de fond -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)"/>
  
  <!-- Point d'interrogation -->
  <g fill="white">
    <!-- Partie supérieure du ? -->
    <path d="M 70 65 Q 70 45, 90 40 Q 110 35, 120 45 Q 130 55, 125 70 Q 120 85, 105 95 L 100 105 L 100 120" 
          stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Point du ? -->
    <circle cx="100" cy="140" r="8"/>
  </g>
</svg>
