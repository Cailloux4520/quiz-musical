version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: quiz-musical-db
    environment:
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_password
      POSTGRES_DB: quiz_musical
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_user -d quiz_musical"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quiz-network

  # MinIO (S3-compatible storage local)
  minio:
    image: minio/minio:latest
    container_name: quiz-musical-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console Web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - quiz-network

  # MinIO Client (mc) - pour créer le bucket automatiquement
  minio-client:
    image: minio/mc:latest
    container_name: quiz-musical-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/quiz-musical-files --ignore-existing;
      /usr/bin/mc anonymous set public myminio/quiz-musical-files;
      exit 0;
      "
    networks:
      - quiz-network

  # Redis (optionnel - pour scaling Socket.io avec Adapter)
  redis:
    image: redis:7-alpine
    container_name: quiz-musical-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quiz-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local

networks:
  quiz-network:
    driver: bridge
